name: Daily Domain Discovery

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Create .env from secrets
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
          echo "MAX_BID=100" >> .env
          echo "PREFERRED_MIN=10" >> .env
          echo "PREFERRED_MAX=50" >> .env
          echo "EXCEPTIONAL_MAX=300" >> .env
      
      - name: Run domain discovery
        run: python -m src.main
        timeout-minutes: 30
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Send Discord notification
        if: always()
        run: |
          DISCOVERED=$(ls data/reports/ 2>/dev/null | wc -l)
          if [ "$DISCOVERED" -gt 0 ]; then
            MSG="✅ Domain discovery completed. Reports generated: $DISCOVERED. Artifacts available in workflow run."
          else
            MSG="⚠️ Domain discovery completed but no reports found."
          fi
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MSG\"}"
      
      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-reports
          path: data/reports/
          retention-days: 30
      
      - name: Upload database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-database
          path: data/domains.db
          retention-days: 7
