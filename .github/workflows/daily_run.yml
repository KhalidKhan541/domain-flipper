name: Daily Domain Discovery

on:
  schedule:
    # 3x daily: 8 AM, 2 PM, 8 PM Pakistan time (UTC: 3 AM, 9 AM, 3 PM)
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Create .env from secrets
        run: |
          mkdir -p data/reports
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" > .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
          echo "MAX_BID=100" >> .env
          echo "PREFERRED_MIN=10" >> .env
          echo "PREFERRED_MAX=50" >> .env
          echo "EXCEPTIONAL_MAX=300" >> .env
          echo "DATABASE_PATH=data/domains.db" >> .env
          echo "LOG_LEVEL=INFO" >> .env
          echo "OFFLINE_MODE=false" >> .env
          echo "WALLET_TYPE=binance" >> .env
          echo "WALLET_CHAIN=base" >> .env
          echo "CRAWLY_API_KEY=${{ secrets.CRAWLY_API_KEY }}" >> .env
      
      - name: Run 6-agent pipeline (parallel discovery + seller outreach)
        run: python -m src.agents
        timeout-minutes: 25
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-reports
          path: data/reports/
          retention-days: 30
      
      - name: Upload outreach log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outreach-log
          path: data/outreach_log.json
          retention-days: 30
