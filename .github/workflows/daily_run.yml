name: Daily Domain Discovery

on:
  schedule:
    # 3x daily: 8 AM, 2 PM, 8 PM Pakistan time (UTC: 3 AM, 9 AM, 3 PM)
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
      
      - name: Create .env from secrets
        run: |
          echo "DISCORD_WEBHOOK_URL=${{ secrets.DISCORD_WEBHOOK_URL }}" >> .env
          echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
          echo "SMTP_PORT=587" >> .env
          echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
          echo "EMAIL_FROM=${{ secrets.EMAIL_FROM }}" >> .env
          echo "EMAIL_TO=${{ secrets.EMAIL_TO }}" >> .env
          echo "MAX_BID=100" >> .env
          echo "PREFERRED_MIN=10" >> .env
          echo "PREFERRED_MAX=50" >> .env
          echo "EXCEPTIONAL_MAX=300" >> .env
      
      - name: Run buyer discovery (Reddit + HN)
        run: python -m src.scanners.buyer_discovery
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Run domain broker pipeline
        run: python -m src.main
        timeout-minutes: 25
        env:
          PYTHONUNBUFFERED: 1
      
      - name: Upload leads
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: buyer-leads
          path: data/buyer_leads.json
          retention-days: 30
      
      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-reports
          path: data/reports/
          retention-days: 30
      
      - name: Upload database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-database
          path: data/domains.db
          retention-days: 7
